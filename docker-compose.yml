services:
  recipe-suggester:
    build: .
    image: recipe-suggester:latest
    container_name: recipe-suggester
    restart: unless-stopped
    ports:
      # Direct IP:port access (DNS-less clients); Caddy also proxies
      # recipe-suggester.servy.lan on the caddy_shared network.
      - "3002:80"
    networks:
      - caddy_shared

networks:
  # Shared with the Caddy stack at ~/caddy/compose.yaml, which reverse-proxies
  # http://recipe-suggester.servy.lan to this service by container name.
  caddy_shared:
    external: true
